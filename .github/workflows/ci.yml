name: CI — Security Scan + Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:

# ─────────────────────────────────────────────
# SECURITY SCAN
# ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit[toml] safety pip-audit

      - name: Bandit scan
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Bandit summary
        run: bandit -r src/ -c pyproject.toml -ll

      - name: pip-audit scan
        run: pip-audit --requirement requirements.txt --format=json --output=audit-report.json || true

      - name: pip-audit summary
        run: pip-audit --requirement requirements.txt

      - name: Safety check
        run: safety check --file requirements.txt --short-report || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            audit-report.json


# ─────────────────────────────────────────────
# TESTS
# ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests -v --cov=src/airplay_receiver --cov-report=xml
        env:
          DISPLAY: ""

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false


# ─────────────────────────────────────────────
# WINDOWS BUILD
# ─────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [security, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip

      # ─────────────────────────────
      # INSTALL BUILD TOOLS
      # ─────────────────────────────
      - name: Upgrade build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
          choco install innosetup -y

      # ─────────────────────────────
      # BUILD APP (ONEFILE)
      # ─────────────────────────────
      - name: Build main app
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name AirPlayReceiver `
            --add-data "src/airplay_receiver;airplay_receiver" `
            --hidden-import sounddevice `
            --hidden-import numpy `
            --hidden-import zeroconf `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import av `
            --clean `
            src/airplay_receiver/__main__.py

      - name: Check EXE architecture
        run: |
          powershell -Command "& { Get-ChildItem dist\AirPlayReceiver.exe | ForEach-Object { $_.VersionInfo } }"
          # Or more precise:
          powershell -Command "Add-Type -AssemblyName System.Reflection; $exe = [System.Reflection.Assembly]::LoadFile('dist\AirPlayReceiver.exe'); Write-Host 'Architecture:' $exe.GetName().ProcessorArchitecture"
            
      # ─────────────────────────────
      # BUILD INSTALLER (Inno Setup)
      # ─────────────────────────────
      - name: Build installer
        run: |
          iscc install\windows\installer.iss

      # ─────────────────────────────
      # PREPARE RELEASE FILES
      # ─────────────────────────────
      - name: Prepare release folder
        run: |
          mkdir release
          copy install\windows\Output\AirPlayReceiverSetup.exe release\

      # ─────────────────────────────
      # SHA256 (installer)
      # ─────────────────────────────
      - name: Generate SHA256
        shell: powershell
        run: |
          Get-FileHash release\AirPlayReceiverSetup.exe -Algorithm SHA256 |
          ForEach-Object { $_.Hash } |
          Out-File release\AirPlayReceiverSetup.exe.sha256 -Encoding ascii

      # ─────────────────────────────
      # UPLOAD ARTIFACT
      # ─────────────────────────────
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayReceiver-Windows
          path: release/

      # ─────────────────────────────
      # GITHUB RELEASE
      # ─────────────────────────────
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/AirPlayReceiverSetup.exe
            release/AirPlayReceiverSetup.exe.sha256

# ─────────────────────────────────────────────
# LINUX BUILD
# ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: [security, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk \
            portaudio19-dev \
            libavcodec-dev libavformat-dev libswscale-dev \
            ffmpeg \
            libgirepository1.0-dev \
            patchelf

      - name: Install Python deps
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller requests

      - name: Build Linux App
        run: |
          pyinstaller \
            --onedir \
            --name airplay-receiver \
            --add-data "src/airplay_receiver:airplay_receiver" \
            --hidden-import sounddevice \
            --hidden-import numpy \
            --hidden-import zeroconf \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import av \
            src/airplay_receiver/__main__.py

      - name: Package Linux
        run: |
          mkdir release
          cp -r dist/airplay-receiver release/
          cp install/linux/install.sh release/
          cp README.md release/
          tar -czf AirPlayReceiver-Linux.tar.gz -C release .

      - name: Generate SHA256
        run: |
          sha256sum AirPlayReceiver-Linux.tar.gz > AirPlayReceiver-Linux.tar.gz.sha256

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayReceiver-Linux
          path: AirPlayReceiver-Linux.tar.gz

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AirPlayReceiver-Linux.tar.gz
            AirPlayReceiver-Linux.tar.gz.sha256