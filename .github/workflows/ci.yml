name: CI — Security Scan + Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  # ── Security scanning ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install bandit[toml] safety pip-audit

      - run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
      - run: bandit -r src/ -c pyproject.toml -ll

      - run: pip-audit --requirement requirements.txt --format=json --output=audit-report.json || true
      - run: pip-audit --requirement requirements.txt

      - run: safety check --file requirements.txt --short-report || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            audit-report.json

  # ── Tests ─────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel

      - run: |
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - run: pytest tests/ -v --cov=src/airplay_receiver --cov-report=xml
        env:
          DISPLAY: ""

      - uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Windows MSI Build ─────────────────────────────────────────────
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [security, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel

      - name: Install deps
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install tools (UPX + WiX)
        run: |
          choco install upx -y
          choco install wixtoolset -y

      - name: Add WiX to PATH
        shell: powershell
        run: |
          $env:Path += ";C:\Program Files (x86)\WiX Toolset v3.11\bin"

      # ── Build app ──
      - name: Build EXE (onedir + compressed)
        shell: powershell
        run: |
          pyinstaller `
            --onedir `
            --noconsole `
            --name AirPlayReceiver `
            --icon install/windows/app.ico `
            --add-data "src/airplay_receiver;airplay_receiver" `
            --hidden-import sounddevice `
            --hidden-import numpy `
            --hidden-import zeroconf `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import av `
            --exclude-module tkinter.test `
            --exclude-module unittest `
            --strip `
            --upx-dir "C:\ProgramData\chocolatey\lib\upx\tools" `
            src/airplay_receiver/__main__.py

      # ── Generate WiX file list ──
      - name: Generate WiX file list
        shell: powershell
        run: |
          heat dir dist\AirPlayReceiver `
            -cg AppFiles `
            -dr INSTALLFOLDER `
            -srd `
            -gg `
            -out install\windows\files.wxs

      # ── Verify EXE ──
      - name: Verify EXE
        shell: powershell
        run: |
          if (Test-Path "dist\AirPlayReceiver\AirPlayReceiver.exe") {
            Start-Process "dist\AirPlayReceiver\AirPlayReceiver.exe"
            Start-Sleep -Seconds 2
            Write-Host "EXE launched"
          } else {
            Write-Error "EXE missing"
            exit 1
          }

      - name: Build MSI
        shell: powershell
        run: |
          candle .\install\windows\installer.wxs .\install\windows\files.wxs
          light installer.wixobj files.wixobj -o AirPlayReceiver.msi

      - name: Package
        run: |
          mkdir release
          copy AirPlayReceiver.msi release\
          copy README.md release\

      - uses: actions/upload-artifact@v4
        with:
          name: AirPlayReceiver-Windows
          path: release/

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: AirPlayReceiver.msi

  # ── Linux Build ───────────────────────────────────────────────────
  build-linux:
    name: Build Linux Bundle
    runs-on: ubuntu-22.04
    needs: [security, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk \
            portaudio19-dev \
            libavcodec-dev libavformat-dev libswscale-dev \
            ffmpeg \
            libgirepository1.0-dev

      - name: Install Python deps
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build Linux bundle
        run: |
          pyinstaller \
            --onedir \
            --name airplay-receiver \
            --add-data "src/airplay_receiver:airplay_receiver" \
            --hidden-import sounddevice \
            --hidden-import numpy \
            --hidden-import zeroconf \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import av \
            src/airplay_receiver/__main__.py

      - name: Package tar.gz
        run: |
          mkdir release
          cp -r dist/airplay-receiver release/
          cp install/linux/install.sh release/
          cp README.md release/
          tar -czf AirPlayReceiver-Linux.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: AirPlayReceiver-Linux
          path: AirPlayReceiver-Linux.tar.gz

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: AirPlayReceiver-Linux.tar.gz